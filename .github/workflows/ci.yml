name: CI

on:
  push:
    branches: [main, "001-three-pane-merge-editor"]
  pull_request:

jobs:
  core:
    name: Rust core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p mcr-core --all-features
      - run: cargo fmt -p mcr-core -- --check
      - run: cargo clippy -p mcr-core -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix ui ci || npm --prefix ui install
      - run: npm --prefix ui run typecheck
      - run: npm --prefix ui test

  vendor-neutral:
    name: Vendor-neutral lint (FR-017)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/vendor-neutral-check.sh
