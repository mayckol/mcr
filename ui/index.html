<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCR — Merge Editor</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <img class="brand-logo" src="/logo.png" alt="MCR" />
      <button id="apply-left" title="Apply all non-conflicting from left">» Left</button>
      <button id="apply-all" title="Apply all non-conflicting">All</button>
      <button id="apply-right" title="Apply all non-conflicting from right">Right «</button>
      <span class="sep"></span>
      <button id="prev" title="Previous change">↑</button>
      <button id="next" title="Next change">↓</button>
      <button id="undo" title="Undo">⟲</button>
      <button id="redo" title="Redo">⟳</button>
      <span class="sep"></span>
      <label>Whitespace
        <select id="whitespace">
          <option value="none">Do not ignore</option>
          <option value="ignore_trailing">Ignore trailing</option>
          <option value="ignore_all">Ignore all</option>
        </select>
      </label>
      <button id="shortcuts" title="Keyboard shortcuts">⌨</button>
      <span id="merge-actions" class="merge-actions" style="display:none">
        <button id="save-exit" class="primary" title="Write result to MERGED and exit">Save &amp; Exit</button>
        <button id="abort" title="Abort the merge (non-zero exit)">Abort</button>
      </span>
      <span id="status" class="status"></span>
    </header>

    <div id="merge-container" class="merge">
      <section class="col"><div class="col-title">Local</div><div id="pane-local" class="pane"></div></section>
      <section class="col"><div class="col-title">Result</div><div id="pane-result" class="pane"></div></section>
      <section class="col"><div class="col-title">Incoming</div><div id="pane-incoming" class="pane"></div></section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
