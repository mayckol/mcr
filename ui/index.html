<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCR — Merge Editor</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <img class="brand-logo" src="/logo.png" alt="MCR" />
      <span class="tool-group">
        <button id="apply-left" title="Apply all non-conflicting from left">» Left</button>
        <button id="apply-all" title="Apply all non-conflicting">All</button>
        <button id="apply-right" title="Apply all non-conflicting from right">Right «</button>
      </span>
      <span class="tool-group">
        <button id="prev" title="Previous change">↑</button>
        <button id="next" title="Next change">↓</button>
      </span>
      <span class="tool-group">
        <button id="undo" title="Undo">⟲</button>
        <button id="redo" title="Redo">⟳</button>
      </span>
      <label class="tool-label">Whitespace
        <select id="whitespace">
          <option value="none">Do not ignore</option>
          <option value="ignore_trailing">Ignore trailing</option>
          <option value="ignore_all">Ignore all</option>
        </select>
      </label>
      <span class="tool-group">
        <button id="shortcuts" title="Keyboard shortcuts">⌨</button>
        <button id="settings" title="Settings (⌘,)">⚙</button>
      </span>
      <span id="merge-actions" class="merge-actions" style="display:none">
        <button id="next-file" title="Next unresolved file" style="display:none">⇥ Next file</button>
      </span>
      <span id="status" class="status"></span>
    </header>

    <div id="work" class="work">
      <aside id="file-list" class="file-list" style="display:none"></aside>
      <div id="merge-container" class="merge">
        <section class="col"><div class="col-title" id="title-local">Local</div><div id="pane-local" class="pane sb-left"></div></section>
        <section class="col"><div class="col-title" id="title-result">Result</div><div id="pane-result" class="pane"></div></section>
        <section class="col"><div class="col-title" id="title-incoming">Incoming</div><div id="pane-incoming" class="pane"></div></section>
      </div>
    </div>

    <footer id="footbar" class="footbar" style="display:none">
      <div class="foot-group">
        <button id="foot-accept-left" title="Apply all non-conflicting changes from the left">Accept Left</button>
        <button id="foot-accept-right" title="Apply all non-conflicting changes from the right">Accept Right</button>
      </div>
      <div class="foot-group">
        <button id="foot-cancel" title="Abort the merge (non-zero exit)">Cancel</button>
        <button id="foot-apply" class="primary" title="Write the resolved result and finish">Apply</button>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
